version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: agentpay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentpay
      POSTGRES_USER: agentpay
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentpay-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: agentpay-chain
    restart: unless-stopped
    command: anvil --host 0.0.0.0 --chain-id 31337 --block-time 2
    ports:
      - "8545:8545"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agentpay-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

volumes:
  postgres_data:
  redis_data:
